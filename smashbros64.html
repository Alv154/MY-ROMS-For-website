<!DOCTYPE html>
<html>
<head>
  <title>Super Smash Bros 64</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      width: 100vw;
      overflow: hidden; 
    }
    #game { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="game"></div>

<script>
  EJS_player = "#game";
  EJS_core = "n64";
  EJS_gameUrl = "https://alv154.github.io/MY-ROMS-For-website/Super%20Smash%20Bros.%20(USA).z64";
  EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
  EJS_autoSave = 1;
  EJS_startOnLoaded = true;
  EJS_threads = false;
  EJS_cheats = false;
  EJS_volume = 0.5;
  EJS_backgroundColor = "#000000";
  EJS_backgroundBlur = false;
  EJS_lightgun = false;
  EJS_multitap = false;
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
