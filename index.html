<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Frickbears 3</title>
    <style>
      @-webkit-keyframes rotation { from { -webkit-transform: rotate(0deg); } to { -webkit-transform: rotate(360deg); } }
      @-moz-keyframes rotation { from { -moz-transform: rotate(0deg); } to { -moz-transform: rotate(360deg); } }
      @-o-keyframes rotation { from { -o-transform: rotate(0deg); } to { -o-transform: rotate(360deg); } }
      @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      html { background: #060612; }

      body {
        font-family: arial;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        min-height: fill-available;
        min-height: 100svh;
        min-width: 100vw;
        background: radial-gradient(56.63% 56.63% at 50% 43.37%, #1c1726 0%, #060612 100%);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        place-items: center;
      }

      body.scrollingDisabled { overflow: hidden; }
      .emscripten { padding-right: 0; display: block; }
      div.emscripten { text-align: center; }

      canvas.emscripten {
        display: none;
        border: 0px none;
        background-color: black;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw !important;
        height: 100vh !important;
        transition: opacity 5s ease-in;
        -webkit-transition: opacity 5s ease-in;
        opacity: 0;
        filter: blur(0) grayscale(0);
        /* Performance boosts */
        image-rendering: pixelated;
        will-change: transform;
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        -ms-interpolation-mode: nearest-neighbor;
      }

      canvas.active { animation-name: fadeIn; animation-duration: 2s; opacity: 1; }
      canvas.paused { animation-name: blur; animation-duration: 0.5s; filter: blur(2px) grayscale(1); }
      canvas.unpaused { animation-name: none; }
      canvas.animatedSizeTransitions { transition: width 0.3s ease, height 0.3s ease; }

      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes blur { 0% { filter: blur(0) grayscale(0); } 100% { filter: blur(2px) grayscale(1); } }

      .spinner {
        height: 30px; width: 30px;
        -webkit-animation: rotation 0.8s linear infinite;
        -moz-animation: rotation 0.8s linear infinite;
        -o-animation: rotation 0.8s linear infinite;
        animation: rotation 0.8s linear infinite;
        border: 5px solid #bdff00;
        border-top: 5px solid #719900;
        border-radius: 100%;
      }

      .floating-control {
        position: absolute; display: none; border: none;
        left: 0px; top: 0px; width: 400px; height: 100%; padding: 10px;
        font-family: monospace; font-size: 8; color: white;
        background: rgba(53, 18, 84, 0.8);
        box-shadow: rgb(9 8 13 / 20%) -2px 2px 4px, rgb(9 8 13 / 40%) -4px 4px 16px;
      }

      #status { display: inline-block; vertical-align: top; font-weight: bold; color: white; }
      #progress { width: 250px; height: 10px; -webkit-appearance: none; appearance: none; padding: 5px; }
      progress[value]::-webkit-progress-bar { background-color: #8492a6; height: 10px; border-radius: 15px; }
      progress[value]::-webkit-progress-value { background-image: -webkit-linear-gradient(left, #719900, #bdff00); height: 10px; border-radius: 15px; }

      div.loading {
        position: absolute; top: 0; bottom: 0; left: 0; right: 0;
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; pointer-events: none; z-index: 999;
      }
      div.loading > * { padding: 10px; margin: 10px; }

      .output-container { text-align: center; margin-top: auto; }
      .output-button {
        border: none; width: 200px; height: 25px; margin: 5px; border-radius: 5px;
        cursor: pointer; background-color: black; color: #20c20e;
        font-family: "Lucida Console", Monaco, monospace;
      }

      #output {
        display: none; height: 200px; background-color: black; color: white;
        font-family: "Lucida Console", Monaco, monospace;
        outline: none; border: none; padding: 0; width: 100%;
      }

      #message-container {
        display: none; min-height: 50px; background-color: rgba(20, 20, 20, 0.5);
        outline: none; border: none; padding: 0; width: 100%; position: absolute; top: 0;
      }

      #messages {
        margin-left: 50px; color: white;
        font-family: "Lucida Console", Monaco, monospace;
        outline: none; border: none; padding: 0;
      }

      img.qrCode { opacity: 1.0; width: 50%; height: 50%; }

      #pauseMenuContainer {
        position: absolute; top: 0; bottom: 0; left: 0; right: 0;
        display: flex; justify-content: center; align-items: center; z-index: 9999;
      }
      #pauseMenuContainer[hidden] { display: none !important; opacity: 0; }

      #pauseMenuBorder {
        background: linear-gradient(135deg, #FA1E4E, transparent 40%);
        padding: 1px; border-radius: 4px;
        clip-path: polygon(10.5px 0, 100% 0, 100% 100%, 0 100%, 0 10.5px);
        width: 70vw; max-width: 400px;
      }

      #pauseMenu {
        display: flex; flex-direction: column; padding: 60px 30px 60px 30px;
        background: linear-gradient(180deg, #2E273F 16.15%, rgba(46, 39, 63, 0.79) 56.25%, #2E273F 91.15%);
        border-radius: 4px;
        clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
        animation-name: fadeIn; animation-duration: 0.5s; opacity: 1;
      }

      #pauseMenu button {
        font-weight: 500; font-size: 17px; color: white;
        background: #FA1E4E; border: 1px solid #FA1E4E; border-radius: 6px;
        padding: 12px 24px; margin: 5px 0;
        -webkit-user-select: none; user-select: none;
      }
      #pauseMenu button#quitButton { background: #FA1E4E40; }
      #pauseMenu button:hover { filter: brightness(1.15); }
      #pauseMenu button:active { filter: brightness(0.85); }
      #pauseMenu button[hidden] { display: none; }

      .graph { font-family: Averta, -apple-system, "Segoe UI", system-ui, sans-serif; font-feature-settings: "tnum", "lnum"; font-style: normal; font-size: 14px; font-weight: 600; line-height: 21px; text-decoration-line: none; letter-spacing: 0.25px; background-color: transparent; fill: #ccc; }
      .graph .grid { stroke: #ccc; stroke-dasharray: 0; stroke-width: 1; }
      .labels { font-size: 4px; }
      .label-title { font-weight: bold; text-transform: uppercase; font-size: 4px; }
      .peer0 { fill: #fa1f4e; stroke: #fa1f4e; }
      .peer1 { fill: #a970ff; stroke: #a970ff; }
      .peer2 { fill: #4574ee; stroke: #4574ee; }
      .peer3 { fill: #c3ff6f; stroke: #c3ff6f; }
      .peer { stroke-width: 0; }
      .peer-frame-delay { fill: none; stroke-width: 1; }
      .acceptable-rollback-button { border: none; width: 50px; height: 25px; margin: 5px; border-radius: 5px; cursor: pointer; background-color: black; color: #20c20e; font-family: "Lucida Console", Monaco, monospace; }
      .peer-acceptable-rollback { fill: none; stroke-width: 1; opacity: 0.3; }
      .relay-rtt { stroke-width: 2; }
      .graph .labels.x-labels { background-color: white; text-anchor: middle; }
      .graph .labels.y-labels { text-anchor: end; }
    </style>
  </head>

  <body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <div id="pauseMenuContainer" hidden>
      <div id="pauseMenuBorder">
        <div id="pauseMenu">
          <button id="resumeButton" onclick="resume()">Resume</button>
          <button id="quitButton" onclick="quitIfSupported()">Quit</button>
        </div>
      </div>
    </div>

    <div class="loading">
      <div class="spinner" id="spinner"></div>
      <div class="emscripten" id="status">Downloading...</div>
      <progress value="0" max="100" id="progress" hidden="1"></progress>
    </div>

    <div class="floating-control" id="multiplayer-stats-container">
      <div class="multiplayer-stats-network" id="multiplayer-stats-network">
        <svg version="1.2" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="graph" aria-labelledby="title" role="img" viewbox="-20 -10 130 140">
          <title id="title">Network stats</title>
          <g class="grid x-grid" id="xGrid">
            <line x1="0" y1="100" x2="100" y2="100"></line>
            <line x1="12.25" y1="99" x2="12.25" y2="101"></line>
            <line x1="25" y1="98" x2="25" y2="102"></line>
            <line x1="37.5" y1="99" x2="37.5" y2="101"></line>
            <line x1="50" y1="98" x2="50" y2="102"></line>
            <line x1="62.5" y1="99" x2="62.5" y2="101"></line>
            <line x1="75" y1="98" x2="75" y2="102"></line>
            <line x1="87.5" y1="99" x2="87.5" y2="101"></line>
            <line x1="100" y1="98" x2="100" y2="102"></line>
          </g>
          <g class="grid y-grid" id="yGrid">
            <line x1="0" y1="0" x2="0" y2="100"></line>
            <line x1="-2" y1="0" x2="2" y2="0"></line>
            <line x1="-1" y1="12.5" x2="1" y2="12.50"></line>
            <line x1="-2" y1="25" x2="2" y2="25"></line>
            <line x1="-1" y1="37.5" x2="1" y2="37.5"></line>
            <line x1="-2" y1="50" x2="2" y2="50"></line>
            <line x1="-1" y1="62.5" x2="1" y2="62.5"></line>
            <line x1="-2" y1="75" x2="2" y2="75"></line>
            <line x1="-1" y1="87.5" x2="1" y2="87.5"></line>
          </g>
          <g class="labels x-labels">
            <text x="0" y="110">-8</text>
            <text x="25" y="110">-4</text>
            <text x="50" y="110">0</text>
            <text x="75" y="110">4</text>
            <text x="100" y="110">8</text>
            <text x="50" y="115" class="label-title">Time shift</text>
          </g>
          <g class="labels y-labels">
            <text x="-4" y="0" alignment-baseline="middle">16</text>
            <text x="-4" y="25" alignment-baseline="middle">12</text>
            <text x="-4" y="50" alignment-baseline="middle">8</text>
            <text x="-4" y="75" alignment-baseline="middle">4</text>
            <text x="-4" y="100" alignment-baseline="middle">0</text>
            <text x="-10" y="50" class="label-title" alignment-baseline="middle">RTT</text>
          </g>
          <g id="stats-network-peers"></g>
          <g id="stats-network-peer-frame-delays"></g>
          <g id="stats-network-relay-rtt"></g>
        </svg>
      </div>
      <div>
        <b>Acceptable rollback frames marker:</b>
        <div>
          <button class="acceptable-rollback-button" onclick="set_acceptable_rollback(0)">Off</button>
          <button class="acceptable-rollback-button" onclick="set_acceptable_rollback(1)">+1</button>
          <button class="acceptable-rollback-button" onclick="set_acceptable_rollback(2)">+2</button>
          <button class="acceptable-rollback-button" onclick="set_acceptable_rollback(4)">+4</button>
        </div>
      </div>
      <div id="multiplayer-stats">[no stats available]</div>
    </div>

    <div class="output-container" id="output-container">
      <button class="output-button" id="stats-button" style="visibility: hidden" onclick="toggleElement('multiplayer-stats-container')">Toggle Stats</button>
      <button class="output-button" id="share-button" style="visibility: hidden" onclick="navigator.clipboard.writeText(window.shareUrl)">Copy Share Url</button>
      <button class="output-button" id="log-state-button" onclick="log_next_game_state()" style="visibility: hidden">Log State</button>
      <textarea id="output" rows="8"></textarea>
    </div>

    <div class="wallpaper-container" id="wallpaper-container" style="display: none">
      <button class="output-button" onclick="toggleElement('wallpaper-config-iframe')">Toggle configurator</button>
    </div>
    <iframe class="floating-control" id="wallpaper-config-iframe" src="about:blank"></iframe>

    <div id="message-container">
      <div id="messages"></div>
    </div>

    <script async data-ad-client="ca-pub-123" data-ad-frequency-hint="30s" data-adbreak-test="on" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
    <script>
      window.adsbygoogle = window.adsbygoogle || [];
      const adBreak = adConfig = function(o) { adsbygoogle.push(o); }
    </script>

    <script id="tick-worker" type="javascript/worker">
      let running = false;
      let stop_called = false;
      let intervalMs = 16;
      onmessage = (e) => {
        if (e.data.run) {
          intervalMs = Math.floor(1000 / e.data.fps);
          if (!running) { running = true; setTimeout(tick, intervalMs); }
        } else { stop_called = true; }
      }
      const tick = () => {
        if (stop_called) { stop_called = false; running = false; return; }
        const start = new Date().getTime();
        postMessage('');
        const end = new Date().getTime();
        let next_update = start + intervalMs - end;
        next_update = Math.max(next_update, 0);
        setTimeout(tick, next_update);
      }
    </script>

    <script type="text/javascript">
      const blob = new Blob([document.querySelector('#tick-worker').textContent]);
      const worker = new Worker(window.URL.createObjectURL(blob));
      worker.onmessage = function () { GM_tick(performance.now()); }
      const isMultiplayer = function () {
        if (typeof GM_is_multiplayer !== 'function') return false;
        return GM_is_multiplayer() !== 0;
      }
      document.addEventListener('visibilitychange', function () {
        if (!isMultiplayer()) return;
        if (document.visibilityState === 'hidden') { worker.postMessage({run: true, fps: 60}); }
        else { worker.postMessage({run: false}); }
      });
    </script>

      // ---- PERFORMANCE BOOSTS FOR LOW-END CHROMEBOOKS ----

      document.documentElement.style.transform = 'translateZ(0)';
      // Disable unnecessary background animations on low-end devices

        document.body.style.background = '#060612';
        document.body.style.backgroundImage = 'none';
      }

      const CHANGE_ASPECT_RATIO = false;

      var bodyElement = document.getElementsByTagName("body")[0];

        canvasElement.classList.add("paused");

      function resume() {
        GM_unpause();

        canvasElement.classList.remove("paused");

        lockOrientationIfSupported();

      function quitIfSupported() {
        if (window.oprt && window.oprt.closeTab) { window.oprt.closeTab(); }

        if (!window.oprt || !window.oprt.lockPortraitOrientation || !window.oprt.lockLandscapeOrientation) return;

        if (viewStatus.landscape === true && viewStatus.portrait === false) { window.oprt.lockPortraitOrientation(); }

        const per_pixel = 100/16;
        const x = 50 + frames_ahead * per_pixel;
